<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutor BI - Teste</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }

    .chat-wrapper {
      max-width: 900px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      border: 1px solid #d9e1ec;
    }

    .chat-header {
      background: #0b1f3a;
      color: white;
      padding: 16px 20px;
    }

    .chat-header h1 {
      margin: 0;
      font-size: 20px;
    }

    .chat-header p {
      margin: 6px 0 0;
      font-size: 13px;
      opacity: 0.9;
    }

    .chat-box {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #f8fafc;
    }

    .message {
      max-width: 75%;
      padding: 12px 14px;
      margin-bottom: 12px;
      border-radius: 14px;
      line-height: 1.4;
      font-size: 15px;
      white-space: pre-line;
    }

    .bot {
      background: #e8eefc;
      color: #1c2b4a;
      border-top-left-radius: 4px;
    }

    .user {
      background: #0b5ed7;
      color: white;
      margin-left: auto;
      border-top-right-radius: 4px;
    }

    .chat-input {
      display: flex;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid #d9e1ec;
      background: #fff;
    }

    .chat-input input {
      flex: 1;
      padding: 12px;
      border: 1px solid #c7d2e3;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    .chat-input button {
      padding: 12px 18px;
      border: none;
      background: #0b1f3a;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .quick-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 12px;
      background: #f8fafc;
    }

    .quick-buttons button {
      border: 1px solid #c7d2e3;
      background: white;
      border-radius: 20px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <div class="chat-header">
      <h1>Tutor - Business Intelligence</h1>
      <p>Assistente virtual para apoio ao aprendizado em BI</p>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="message bot">
        Olá! Sou o Tutor BI de teste.

        Posso ajudar você a:
        - começar um conteúdo
        - revisar um tema
        - praticar com perguntas

        Escolha uma opção ou digite sua dúvida.
      </div>
    </div>

    <div class="quick-buttons">
      <button onclick="sendQuickMessage('comecar')">Quero começar</button>
      <button onclick="sendQuickMessage('revisar')">Quero revisar</button>
      <button onclick="sendQuickMessage('praticar')">Quero praticar</button>
      <button onclick="sendQuickMessage('video')">Me indique um vídeo</button>
    </div>

    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Digite sua dúvida aqui..." />
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

<script>

  let ultimaPergunta = "";

  function addMessage(text, sender = "bot") {
    const chatBox = document.getElementById("chatBox");
    const msg = document.createElement("div");
    msg.className = sender === "user" ? "message user" : "message bot";

    let message = text;

    // transforma (link: URL) em link clicável bonito
    message = message.replace(
      /\(link:\s*(https?:\/\/[^\s)]+)\)/g,
      '<a href="$1" target="_blank" style="color:#1a73e8; text-decoration:underline;">Acessar material</a>'
    );

    // ⚠️ aqui muda de textContent → innerHTML
    msg.innerHTML = message;

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  async function callBackend(userMessage, objetivo) {
  const response = await fetch("https://gem-tutor-backend-20855190353.us-central1.run.app/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: userMessage,
      objetivo: objetivo
    })
   });

  if (!response.ok) {
    const errorText = await response.text();
    throw new Error(`Erro do backend: ${response.status} - ${errorText}`);
  }

  const data = await response.json();
  return data.reply;
  }

  async function sendMessage(text = null, objetivo = "normal", mostrarPergunta = true) {
    const input = document.getElementById("userInput");
    const chatBox = document.getElementById("chatBox");

    if (!text) {
      text = input.value.trim();
      if (!text) return;
    }

    ultimaPergunta = text;

    if (mostrarPergunta) {
      addMessage(text, "user");
      input.value = "";
    }

    const thinkingMsg = document.createElement("div");
    thinkingMsg.className = "message bot";
    thinkingMsg.textContent = "Pensando...";
    chatBox.appendChild(thinkingMsg);
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
      const reply = await callBackend(text, objetivo);

      chatBox.removeChild(thinkingMsg);
      addMessage(reply, "bot");
    } catch (error) {
      chatBox.removeChild(thinkingMsg);
      addMessage("Erro ao conectar com a IA.", "bot");
      console.error("Erro completo:", error);
    }
  }

  function sendQuickMessage(objetivo) {
      if (!ultimaPergunta) {
        alert("Faça uma pergunta primeiro.");
        return;
      }

      sendMessage(ultimaPergunta, objetivo, false);
    }

  document.getElementById("userInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
      sendMessage();
    }
  });
</script>
</body>
</html>
