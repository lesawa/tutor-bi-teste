<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutor BI - Teste</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }

    .chat-wrapper {
      max-width: 900px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      border: 1px solid #d9e1ec;
    }

    .chat-header {
      background: #0b1f3a;
      color: white;
      padding: 16px 20px;
    }

    .chat-header h1 {
      margin: 0;
      font-size: 20px;
    }

    .chat-header p {
      margin: 6px 0 0;
      font-size: 13px;
      opacity: 0.9;
    }

    .chat-box {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #f8fafc;
    }

    .message {
      max-width: 75%;
      padding: 12px 14px;
      margin-bottom: 12px;
      border-radius: 14px;
      line-height: 1.4;
      font-size: 15px;
      white-space: pre-line;
    }

    .bot {
      background: #e8eefc;
      color: #1c2b4a;
      border-top-left-radius: 4px;
    }

    .user {
      background: #0b5ed7;
      color: white;
      margin-left: auto;
      border-top-right-radius: 4px;
    }

    .chat-input {
      display: flex;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid #d9e1ec;
      background: #fff;
    }

    .chat-input input {
      flex: 1;
      padding: 12px;
      border: 1px solid #c7d2e3;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    .chat-input button {
      padding: 12px 18px;
      border: none;
      background: #0b1f3a;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .quick-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 12px;
      background: #f8fafc;
    }

    .quick-buttons button {
      border: 1px solid #c7d2e3;
      background: white;
      border-radius: 20px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <div class="chat-header">
      <h1>Tutor BI - Ambiente de Teste</h1>
      <p>Protótipo visual para validação de embed no Google Sites</p>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="message bot">
        Olá! Sou o Tutor BI de teste.

        Posso ajudar você a:
        - começar um conteúdo
        - revisar um tema
        - praticar com perguntas

        Escolha uma opção abaixo ou digite sua dúvida.
      </div>
    </div>

    <div class="quick-buttons">
      <button onclick="sendQuickMessage('Quero começar')">Quero começar</button>
      <button onclick="sendQuickMessage('Quero revisar')">Quero revisar</button>
      <button onclick="sendQuickMessage('Quero praticar')">Quero praticar</button>
      <button onclick="sendQuickMessage('Me indique um vídeo')">Me indique um vídeo</button>
    </div>

    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Digite sua dúvida aqui..." />
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

<script>
  const API_KEY = "digite a senha";

  function addMessage(text, sender = "bot") {
    const chatBox = document.getElementById("chatBox");
    const msg = document.createElement("div");
    msg.className = sender === "user" ? "message user" : "message bot";
    msg.textContent = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  async function callGemini(userMessage) {
    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    const prompt = `
Você é um tutor de Business Intelligence.
Responda em português do Brasil.
Seja clara, didática e objetiva.
Ajude o aluno a estudar.
Quando fizer sentido, sugira começar, revisar ou praticar.

Pergunta do aluno:
${userMessage}
    `;

    const body = {
      contents: [
        {
          parts: [
            { text: prompt }
          ]
        }
      ]
    };

    const response = await fetch(endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });

    if (!response.ok) {
      const errorText = await response.text();
      console.error("Resposta bruta da API:", errorText);
      throw new Error(`Erro da API: ${response.status} - ${errorText}`);
    }

    const data = await response.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Não consegui gerar uma resposta agora.";
  }

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();

    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    addMessage("Pensando...", "bot");

    try {
      const chatBox = document.getElementById("chatBox");
      const thinkingMsg = chatBox.lastElementChild;

      const reply = await callGemini(message);

      thinkingMsg.textContent = reply;
    } catch (error) {
  console.error("Erro completo:", error);

  const chatBox = document.getElementById("chatBox");
  const thinkingMsg = chatBox.lastElementChild;

  thinkingMsg.textContent = `Erro ao conectar com a IA: ${error.message}`;
    }
  }

  function sendQuickMessage(text) {
    document.getElementById("userInput").value = text;
    sendMessage();
  }

  document.getElementById("userInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
      sendMessage();
    }
  });
</script>
</body>
</html>
